<div id="st-char-phone-wrapper" style="display: none;">
    <div id="phone-drag-handle"></div>
    
    <div class="iphone">
        <div class="dynamic-island"></div>
        
        <div class="status-bar" id="status-bar">
            <div id="time">09:41</div>
            <div class="status-right">
                <div class="signal-bars">
                    <div class="bar active"></div><div class="bar active"></div>
                    <div class="bar active"></div><div class="bar"></div>
                </div>
                <div class="battery-container"><div class="battery-level"></div></div>
            </div>
        </div>

        <div id="passcode-screen" class="layer">
            <div class="passcode-title">输入密码</div>
            <div class="passcode-dots">
                <div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div>
            </div>
            <div class="numpad">
                <div class="num-key" onclick="inputPasscode(1)">1</div>
                <div class="num-key" onclick="inputPasscode(2)">2</div>
                <div class="num-key" onclick="inputPasscode(3)">3</div>
                <div class="num-key" onclick="inputPasscode(4)">4</div>
                <div class="num-key" onclick="inputPasscode(5)">5</div>
                <div class="num-key" onclick="inputPasscode(6)">6</div>
                <div class="num-key" onclick="inputPasscode(7)">7</div>
                <div class="num-key" onclick="inputPasscode(8)">8</div>
                <div class="num-key" onclick="inputPasscode(9)">9</div>
                <div class="num-key empty"></div>
                <div class="num-key" onclick="inputPasscode(0)">0</div>
                <div class="num-key cancel" onclick="cancelPasscode()">取消</div>
            </div>
        </div>

        <div id="lock-screen" class="layer" onclick="showPasscode()">
            <div class="lock-icon-svg">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </div>
            <div id="lock-time">09:41</div>
            <div id="lock-date">向上轻扫以解锁</div>
            <div class="home-indicator swipe-up-hint"></div>
        </div>

        <div id="home-screen" class="layer">
            <div class="app-grid" id="main-grid"></div>
            <div class="dock" id="dock-grid"></div>
        </div>

        <div id="win-wechat" class="window wechat-ui">
            <div class="wechat-header">微信</div>
            <div id="wechat-list" class="wechat-content">
                <div class="ai-loading">正在读取角色记忆同步数据...</div>
            </div>
            <div class="wechat-tabbar">
                <div class="tab-item active"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C6.48 3 2 6.8 2 11.5c0 2.67 1.45 5.06 3.69 6.64L5 21l3.5-1.5c1.1.33 2.27.5 3.5.5 5.52 0 10-3.8 10-8.5S17.52 3 12 3z"/></svg>微信</div>
                <div class="tab-item"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-6 12H4v-2h10v2zm0-4H4V10h10v2zm6 0h-4v-2h4v2z"/></svg>通讯录</div>
                <div class="tab-item"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>发现</div>
                <div class="tab-item"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>我</div>
            </div>
            <div class="home-indicator" onclick="closeApp()"></div>
        </div>

        <div id="win-bank" class="window bank-ui">
            <div class="bank-header">我的账户</div>
            <div class="bank-card">
                <div class="card-logo">ICBC 私人银行</div>
                <div class="card-balance">余额 (元)</div>
                <div class="card-amount" id="bank-balance">****</div>
            </div>
            <div class="bank-title">近期交易流水</div>
            <div id="bank-list" class="bank-list"></div>
            <div class="home-indicator" onclick="closeApp('bank')"></div>
        </div>

        <div id="win-notes" class="window notes-ui">
            <div class="notes-header"><svg viewBox="0 0 24 24" fill="none" stroke="#d4a017" stroke-width="2"><path d="M19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2z"></path><line x1="9" y1="9" x2="15" y2="9"></line><line x1="9" y1="13" x2="15" y2="13"></line></svg>备忘录</div>
            <div id="notes-list" class="notes-list"></div>
            <div class="home-indicator" onclick="closeApp()"></div>
        </div>
        
        <div id="win-settings" class="window">
            <div class="settings-header">设置</div>
            <div style="flex:1; overflow-y:auto;">
                <p class="settings-subtitle">API 供应商 (仅用于手机内容生成)</p>
                <div class="ios-list">
                    <div class="ios-row"><label>Key</label><input type="password" id="phone-api-key" placeholder="保留为空则使用酒馆默认 API"></div>
                </div>
                <button class="btn-action" onclick="generatePhoneData()">♻️ 重新生成当前角色手机数据</button>
            </div>
            <div class="home-indicator" onclick="closeApp()"></div>
        </div>

        </div>
</div>
