<div id="st-char-phone-wrapper">
    <div id="phone-drag-handle"></div>
    <div class="iphone">
        <div class="dynamic-island"></div>
        <div class="status-bar" id="status-bar">
            <div>09:41</div>
            <div style="font-size: 12px;">5G 🔋</div>
        </div>

        <div id="lock-screen" class="layer" onclick="showPasscode()">
            <div style="margin-top: 150px; font-size: 80px; font-weight: 200;">09:41</div>
            <div style="margin-top: 10px; font-size: 20px;">向上轻扫以解锁</div>
            <div class="home-indicator"></div>
        </div>

        <div id="passcode-screen" class="layer">
            <div class="passcode-title">输入密码</div>
            <div class="passcode-dots">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div class="numpad">
                <div class="num-key" onclick="inputPasscode('1')">1</div><div class="num-key" onclick="inputPasscode('2')">2</div><div class="num-key" onclick="inputPasscode('3')">3</div>
                <div class="num-key" onclick="inputPasscode('4')">4</div><div class="num-key" onclick="inputPasscode('5')">5</div><div class="num-key" onclick="inputPasscode('6')">6</div>
                <div class="num-key" onclick="inputPasscode('7')">7</div><div class="num-key" onclick="inputPasscode('8')">8</div><div class="num-key" onclick="inputPasscode('9')">9</div>
                <div></div><div class="num-key" onclick="inputPasscode('0')">0</div><div class="num-key" style="background:transparent; font-size:16px;" onclick="cancelPasscode()">取消</div>
            </div>
        </div>

        <div id="home-screen" class="layer">
            <div class="app-grid" id="main-grid"></div>
            <div class="dock" id="dock-grid"></div>
        </div>

        <div id="win-wechat" class="window wechat-ui">
            <div class="wechat-header">微信</div>
            <div id="wechat-list" style="flex:1; overflow-y:auto;"></div>
            <div class="home-indicator" onclick="closeApp()"></div>
        </div>

        <div id="win-bank" class="window bank-ui">
            <div class="bank-header">工商银行</div>
            <div class="bank-card">
                <div style="font-size:12px; opacity:0.8;">私人银行卡</div>
                <div style="margin-top:20px; font-size:14px; color:#999;">可用余额 (元)</div>
                <div id="bank-balance" style="font-size:32px; font-weight:600; margin-top:5px;">***</div>
            </div>
            <div id="bank-list" style="flex:1; overflow-y:auto;"></div>
            <div class="home-indicator" style="background:#fff;" onclick="closeApp()"></div>
        </div>

        <div id="win-notes" class="window notes-ui">
            <div class="notes-header">备忘录</div>
            <div id="notes-list" style="flex:1; overflow-y:auto;"></div>
            <div class="home-indicator" onclick="closeApp()"></div>
        </div>

        <div id="win-settings" class="window settings-ui">
            <div class="settings-header">同步系统</div>
            <div style="flex:1; padding-top:20px;">
                <p style="text-align:center; color:#666; font-size:14px; padding:0 20px;">点击下方按钮，系统将调用酒馆当前模型，根据角色性格自动生成其私密数据。</p>
                <button class="btn-action" onclick="generatePhoneData()">一键同步角色手机数据</button>
            </div>
            <div class="home-indicator" onclick="closeApp()"></div>
        </div>
    </div>
</div>
